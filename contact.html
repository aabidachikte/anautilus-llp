<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anautilus LLP – Navigation & Footer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ==========================================================================
           Anautilus LLP - Unified Ocean-Inspired Design System
           ========================================================================== */
        :root {
            /* Palette Architecture */
            --bg-deep-ocean: #0B2545;      /* Main section canvas background */
            --bg-clean-marine: #134074;    /* Cards, dashboard panels, structural layers */
            --accent-river-aqua: #00B4D8;  /* Primary brand accents, button states, hovers */
            --accent-seafoam: #90E0EF;     /* UI tags, input labels, secondary typography */
            --text-pristine: #F4F9FC;      /* Highly readable off-white paragraph tone */
            --text-white: #FFFFFF;         /* Primary headers & main branding components */
            --bg-footer-dark: #003356;     /* Specialized heavy navy bottom anchor depth */
            
            /* Layout Tokens */
            --radius-lg: 16px;
            --radius-md: 8px;
            --transition-smooth: all 0.3s ease;
        }

        /* Base Layout & Core Structure */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-deep-ocean);
            color: var(--text-pristine);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* --- MODERNIZED NAVIGATION BAR --- */
        header {
            background-color: rgba(11, 37, 69, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(144, 224, 239, 0.1);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-area img {
            height: 45px;
            width: auto;
            border-radius: 4px;
        }

        .brand-name {
            color: var(--text-white);
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .brand-name span {
            color: var(--accent-river-aqua);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav ul li a {
            color: var(--text-pristine);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition-smooth);
            position: relative;
        }

        nav ul li a:hover {
            color: var(--accent-river-aqua);
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--accent-river-aqua);
            transition: var(--transition-smooth);
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* --- CONTENT WRAPPER PADDING ADJUSTMENT --- */
        .main-content {
            padding-top: 85px; /* Safely clears the fixed navigation block */
            flex-grow: 1;
        }

        /* ==========================================================================
           Form & Component Elements
           ========================================================================== */
        .section-tagline {
            color: var(--accent-seafoam);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .section-heading {
            color: var(--text-white);
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            max-width: 700px;
        }

        .section-heading span.highlight {
            color: var(--accent-river-aqua);
        }

        .section-description {
            color: var(--text-pristine);
            font-size: 1.1rem;
            max-width: 750px;
            opacity: 0.9;
            margin-bottom: 48px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 32px;
            margin-bottom: 48px;
        }

        .card-panel {
            background-color: var(--bg-clean-marine);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: 0 10px 30px rgba(11, 37, 69, 0.3);
